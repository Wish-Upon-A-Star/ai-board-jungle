services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-board-postgres
    environment:
      POSTGRES_USER: ai_board
      POSTGRES_PASSWORD: ai_board
      POSTGRES_DB: ai_board
    ports:
      - "5432:5432"
    volumes:
      - ai_board_pg:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: ai-board-redis
    ports:
      - "6379:6379"
volumes:
  ai_board_pg:
